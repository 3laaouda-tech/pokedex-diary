<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
      body {
        @apply bg-[#1a1a2e] text-[#e0e0f0] font-sans min-h-screen;
      }
    }

     @layer components {
        .dex-header {
        @apply bg-[#16213e] border-b border-[#2a2a4a] sticky top-0 z-50;
      }

      .dex-logo {
        @apply text-2xl font-extrabold tracking-widest text-[#e94560] uppercase;
      }
      .dex-search-input {
        @apply bg-[#1a1a2e] border border-[#2a2a4a] px-4 py-2 rounded-lg text-sm w-64;
      }
     }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="dex-header">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
            <div class="dex-logo">Pokédex</div>

            <div class="flex-1"></div>

            <input type="text" placeholder="Search..."
                class="dex-search-input">
        </div>
    </header>

</body>

</html>
