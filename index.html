<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <style type="text/tailwindcss">
        @layer base {
      body {
        @apply bg-[#1a1a2e] text-[#e0e0f0] font-sans min-h-screen;
      }
    }

     @layer components {
        .dex-header {
        @apply bg-[#16213e] border-b border-[#2a2a4a] sticky top-0 z-50;
      }

      .dex-logo {
        @apply text-2xl font-extrabold tracking-widest text-[#e94560] uppercase;
      }
      .dex-search-input {
        @apply bg-[#1a1a2e] border border-[#2a2a4a] px-4 py-2 rounded-lg text-sm w-64;
      }
      .dex-main {
        @apply max-w-7xl mx-auto px-6 py-10;
      }
      .dex-grid {
        @apply grid gap-5;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
      .dex-card {
        @apply bg-[#0f3460] rounded-2xl overflow-hidden transition-all duration-300;
      }
      .dex-card:hover {
        @apply -translate-y-1;
      }
      .dex-card__img {
        @apply h-40 flex items-center justify-center text-5xl;
        background: linear-gradient(135deg, rgba(15,52,96,0.8), rgba(26,26,46,0.9));
      }

      .dex-card__body {
        @apply p-4;
      }

      .dex-card__number {
        @apply text-xs text-[#e94560] tracking-widest;
      }

      .dex-card__name {
        @apply font-bold text-lg mb-2;
      }

      .type-badge {
        @apply px-2 py-0.5 rounded-full text-xs font-bold text-white uppercase;
      }

      .type-grass { @apply bg-green-500; }
      .type-fire { @apply bg-orange-500; }
      .type-water { @apply bg-blue-500; }
      .type-poison { @apply bg-purple-500; }
      .type-bug { @apply bg-green-700; }
      .type-flying { @apply bg-sky-400; }
      .type-normal { @apply bg-gray-500; }
     }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="dex-header">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
            <div class="dex-logo">Pokédex</div>

            <div class="flex-1"></div>

            <input type="text" placeholder="Search..." class="dex-search-input">
        </div>
    </header>

    <!-- MAIN -->
    <main class="dex-main">
        <div class="mb-6">
            <h1 class="text-3xl font-bold">Pokédex</h1>
            <p class="text-sm text-gray-400">Showing Pokémon</p>
        </div>

        <div class="dex-grid">
            <!-- CARD -->
            <a href="details.html" class="dex-card">
                <div class="dex-card__img"><img
                        src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/detail/001.png"
                        alt="Bulbasaur"></div>
                <div class="dex-card__body">
                    <div class="dex-card__number">#0001</div>
                    <div class="dex-card__name">Bulbasaur</div>
                    <div class="flex gap-1">
                        <span class="type-badge type-grass">grass</span>
                        <span class="type-badge type-poison">poison</span>
                    </div>
                </div>
            </a>
            
        </div>
    </main>
    <script src = "main.js"></script>
</body>

</html>
