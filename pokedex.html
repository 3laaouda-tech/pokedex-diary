<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-[#1a1a2e] text-[#e0e0f0];
      }
}
      @layer components {

        .dex-header {
        @apply bg-[#16213e] border-b border-[#2a2a4a] sticky top-0 z-50;
      }

      .dex-logo {
        @apply text-2xl font-extrabold tracking-widest text-[#e94560] uppercase;
      }
      .dex-search-input {
        @apply bg-[#1a1a2e] border border-[#2a2a4a] px-4 py-2 rounded-lg text-sm w-64;
      }
      .dex-back {
        @apply text-xs text-gray-400 hover:text-[#e94560];
      }

      .card {
        @apply bg-[#0f3460] rounded-2xl border border-[#2a2a4a];
      }

      .tab {
        @apply flex-1 text-center py-3 text-xs uppercase text-gray-400 border-b-2 text-[#e94560] border-[#e94560];
      }

  

      .type-badge {
        @apply px-3 py-1 text-xs rounded text-white uppercase;
      }

      .type-grass { @apply bg-green-500; }
      .type-poison { @apply bg-purple-500; }

    }

  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="dex-header">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
      <div class="dex-logo">Pokédex</div>

      <div class="flex-1">
        <nav>
          <ul class="list-none flex flex-wrap gap-5">
            <li><a href="index.html" class="text-gray-400 hover:text-white">Home</a></li>
            <li><a href="pokedex.html" class="text-gray-400 hover:text-white">Pokédex</a></li>
          </ul>
        </nav>
      </div>

      <input type="text" placeholder="Search..." class="dex-search-input" id="searchInput">
      <button class="dex-search__btn" id="searchBtn">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-6 py-10 grid md:grid-cols-2 gap-8">


    <!-- LEFT -->
    <div class="space-y-4">
      <div class="card p-6 flex items-center justify-center">
        <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/001.png" alt="Bulbasaur">
      </div>


    </div>


    <!-- RIGHT -->
    <div class="space-y-6">

      <p>
        For some time after its birth, it uses the nutrients packed into the seed on its back in order to grow.
      </p>

      <!-- Info -->
      <div class="card p-4 space-y-2">
        <p><span class="text-gray-400">Height:</span> 2'04"</p>
        <p><span class="text-gray-400">Weight:</span> 15.2 lbs</p>
        <p><span class="text-gray-400">Ability:</span> Overgrow</p>
      </div>

      <!-- Type -->
      <div>
        <h3 class="mb-2 font-bold">Type</h3>
        <div class="flex gap-2">
          <span class="type-badge type-grass">grass</span>
          <span class="type-badge type-poison">poison</span>
        </div>
      </div>

      <div class="card">
        <div class="flex">
          <div class="tab">Stats</div>
        </div>
        <div class="p-4 text-sm space-y-2">
          <p>HP: 45</p>
          <p>Attack: 49</p>
          <p>Defense: 49</p>
          <p>Speed: 45</p>
        </div>
      </div>


    </div>
  </main>
  <script src="pokedex.js"></script>
</body>

</html>
